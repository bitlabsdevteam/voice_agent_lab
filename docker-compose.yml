services:
  voice-agent:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      VOICE_AGENT_PROVIDER: mock-openai
      VOICE_AGENT_MODEL: gpt-realtime-2
      VOICE_AGENT_SESSION_STORE: file
      VOICE_AGENT_EVENT_SINK: file
      VOICE_AGENT_DATA_DIR: /data
      DATABASE_URL: postgres://voice_agent:voice_agent_dev_password@postgres:5432/voice_agent
    volumes:
      - voice-agent-data:/data
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: voice_agent
      POSTGRES_USER: voice_agent
      POSTGRES_PASSWORD: voice_agent_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.2
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana-dashboard.json:/var/lib/grafana/dashboards/voice-agent-dashboard.json:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  voice-agent-data:
  postgres-data:
  grafana-data:
