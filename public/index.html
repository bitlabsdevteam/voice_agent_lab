<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aiko Voice Agent</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="avatar-page">
    <main class="avatar-shell" data-avatar-state="idle">
      <section class="avatar-stage" aria-labelledby="avatar-title">
        <canvas id="avatarCanvas" aria-label="Interactive 3D avatar stage for Aiko"></canvas>
        <div class="stage-vignette" aria-hidden="true"></div>
        <div class="loading-ring" aria-hidden="true"></div>
        <div class="mic-pulse" aria-hidden="true"></div>
        <div class="drop-affordance">
          <button id="avatarFileButton" type="button">Drop or choose GLB/GLTF</button>
          <input id="avatarFileInput" type="file" accept=".glb,.gltf,model/gltf-binary,model/gltf+json" hidden>
        </div>

        <div class="avatar-copy">
          <p class="eyebrow">Realtime voice assistant</p>
          <h1 id="avatar-title">Aiko</h1>
          <p class="lede">A calm, attentive voice agent ready for live support conversations.</p>
        </div>

        <section class="voice-dock" aria-labelledby="session-title">
          <div>
            <p class="dock-label" id="session-title">Session</p>
            <p id="status" class="dock-status" role="status">Idle. No microphone connection has been opened.</p>
          </div>
          <div class="actions compact-actions">
            <button id="startButton" type="button">Start voice session</button>
            <button id="stopButton" type="button" disabled>Stop</button>
            <a class="button-link" href="/ops.html">Operations</a>
          </div>
        </section>

        <audio id="remoteAudio" autoplay></audio>
      </section>
    </main>
    <script src="/assets/avatar-runtime.js"></script>
    <script type="module" src="/avatar.js"></script>
  </body>
</html>
